services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: skdo
      POSTGRES_USER: skdo
      POSTGRES_PASSWORD: skdo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:RELEASE.2025-02-07T23-21-09Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  api:
    build: .
    depends_on:
      - db
      - minio
    environment:
      SKDO_DATABASE_URL: postgresql+psycopg://skdo:skdo@db:5432/skdo
      SKDO_S3_ENDPOINT_URL: http://minio:9000
      SKDO_S3_ACCESS_KEY_ID: minioadmin
      SKDO_S3_SECRET_ACCESS_KEY: minioadmin
      SKDO_S3_BUCKET: skdo
    ports:
      - "8000:8000"

  ui:
    build: .
    depends_on:
      - api
    command: python -m streamlit run apps/ui/app.py --server.address 0.0.0.0 --server.port 8501
    environment:
      SKDO_UI_API_BASE_URL: http://api:8000
    ports:
      - "8501:8501"

volumes:
  postgres_data:
  minio_data:
